<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Team | VEXLORE</title>

<link rel="stylesheet" href="yourteam.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>

<header>
<div class="logo-box">
<img src="logo2.png" alt="Logo">
<h1>VEXLORE</h1>
</div>
</header>

<div class="container">

<h2 class="title">YOUR TEAM</h2>

<div class="team-card">

<img id="teamLogo" src="logo2.png" class="team-logo">

<h2 id="teamName">Loading...</h2>

<div class="team-details">

<p><strong>Leader:</strong> <span id="leaderName"></span></p>

<p><strong>Email:</strong> <span id="email"></span></p>

<p><strong>UTR:</strong> <span id="utr"></span></p>

<p><strong>Total Players:</strong> <span id="totalPlayers"></span></p>

</div>

</div>

<h2 class="players-title">TEAM PLAYERS</h2>

<div id="playersList"></div>

</div>

<script src="yourteam.js"></script>

</body>
</html>
