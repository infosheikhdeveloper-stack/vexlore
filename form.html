<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VEXLORE Registration</title>

<link rel="stylesheet" href="form.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>

<header>
<div class="logo-box">
<img src="logo2.png" alt="Logo">
<h1>VEXLORE</h1>
</div>
</header>

<div class="container">

<h2 class="title">TOURNAMENT REGISTRATION</h2>

<form id="registrationForm">

<!-- TEAM DETAILS -->

<div class="card">

<h3>TEAM DETAILS</h3>

<label>Team Name</label>
<input type="text" id="teamName" required>

<label>Captain Email</label>
<input type="email" id="email" required>

<label>Team Logo</label>
<input type="file" id="teamLogo" accept="image/*">

<img id="logoPreview" class="preview">

</div>

<!-- PLAYERS -->

<div class="card">

<div class="player-header">
<h3>PLAYERS</h3>

<button type="button" id="addPlayerBtn">
+ ADD PLAYER
</button>

</div>

<div id="playersContainer"></div>

</div>

<!-- PAYMENT -->

<div class="card">

<h3>TOURNAMENT PAYMENT</h3>

<img src="qr.png" class="qr-image">

<div class="payment-box">

<p><strong>Entry Fee:</strong></p>
<p>₹500 Per Team</p>

<br>

<p><strong>UPI ID:</strong></p>
<p>7051932522@fam</p>

<br>

<p><strong>Name:</strong></p>
<p>Falak Nisar</p>

</div>

<label>UTR Number (12 Digits)</label>

<input
type="text"
id="utr"
maxlength="12"
required>

<div class="note-box">
⚠ Payment Screenshot WhatsApp par send karna zaroori hai. Screenshot verify hone ke baad hi registration approve hogi.
</div>

</div>

<button type="submit" class="submit-btn">
SEND REQUEST
</button>

</form>

</div>

<script src="form.js"></script>

</body>
</html>
